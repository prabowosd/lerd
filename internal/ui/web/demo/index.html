<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex" />
    <title>Lerd dashboard demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }
      /* The demo has no daemon, so hide the SPX profiler and Documentation rail buttons. */
      aside button[title='Profiler'],
      aside button[title='Documentation'] {
        display: none;
      }
    </style>
  </head>
  <!-- Same base classes as the real app body so all text inherits the right
       light/dark color (otherwise unstyled text falls back to black). -->
  <body class="bg-gray-50 dark:bg-lerd-bg text-gray-900 dark:text-gray-100 h-screen overflow-hidden font-sans antialiased">
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
