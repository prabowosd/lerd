    async loadAppLogFiles(site) {
      if (!site) site = this.selectedSite;
      if (!site) return;
      this.appLogs.loading = true;
      try {
        const res = await fetch(`/api/app-logs/${site.domain}`);
        const data = await res.json();
        this.appLogs.files = data.files || [];
        if (this.appLogs.files.length > 0) {
          // Always select the most recently modified file
          this.appLogs.selectedFile = this.appLogs.files[0].name;
        }
        if (this.appLogs.selectedFile) {
          await this.loadAppLogEntries();
        } else {
          this.appLogs.loading = false;
        }
      } catch (e) {
        this.appLogs.loading = false;
      }
      this.startAppLogPolling();
    },

    async loadAppLogEntries() {
      const site = this.selectedSite;
      if (!site || !this.appLogs.selectedFile) return;
      this.appLogs.loading = true;
      try {
        const limit = this.appLogs.showAll ? 0 : 100;
        const res = await fetch(`/api/app-logs/${site.domain}/${this.appLogs.selectedFile}?limit=${limit}`);
        const data = await res.json();
        this.appLogs.entries = data.entries || [];
      } catch (e) {
        this.appLogs.entries = [];
      } finally {
        this.appLogs.loading = false;
      }
      // Match container/queue/etc. log panes: oldest at top, newest at bottom,
      // pinned to the bottom on every update.
      this.$nextTick(() => {
        const el = this.$refs.appLogScroll;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    toggleAppLogEntry(i, ev) {
      const wasExpanded = this.appLogs.expandedIdx === i;
      this.appLogs.expandedIdx = wasExpanded ? -1 : i;
      if (wasExpanded) return;
      // Wait for x-collapse to finish animating, then scroll the row (header
      // + expanded detail) fully into view. Without this, expanding the
      // bottom-most entry leaves the detail panel below the viewport.
      const row = ev && ev.currentTarget ? ev.currentTarget.parentElement : null;
      if (!row) return;
      setTimeout(() => {
        if (this.appLogs.expandedIdx !== i) return;
        row.scrollIntoView({ block: 'end', behavior: 'smooth' });
      }, 220);
    },

    startAppLogPolling() {
      this.stopAppLogPolling();
      this._appLogInterval = setInterval(() => {
        if (this.siteLogsTab === 'app' && this.selectedSite && this.appLogs.selectedFile && !this.appLogs.loading) {
          this.loadAppLogEntries();
        }
      }, 5000);
    },

    stopAppLogPolling() {
      if (this._appLogInterval) { clearInterval(this._appLogInterval); this._appLogInterval = null; }
    },

    setSiteLogsTab(tab) {
      this.siteLogsTab = tab;
      const site = this.selectedSite;
      if (!site) return;

      // Close every other worker log stream before opening the new one.
      // Browsers cap HTTP/1.1 at 6 concurrent connections per origin;
      // leaving previous tabs' EventSources open makes new ones queue in
      // CONNECTING state and the UI sticks on "connecting...".
      if (tab !== 'queue') this.closeSiteQueueLogs();
      if (tab !== 'horizon') this.closeSiteHorizonLogs();
      if (tab !== 'stripe') this.closeSiteStripeLogs();
      if (tab !== 'schedule') this.closeSiteScheduleLogs();
      if (tab !== 'reverb') this.closeSiteReverbLogs();
      if (!tab.startsWith('worker:')) this.closeSiteWorkerLogs();

      if (tab === 'queue') this.openSiteQueueLogs(site);
      if (tab === 'horizon') this.openSiteHorizonLogs(site);
      if (tab === 'stripe') this.openSiteStripeLogs(site);
      if (tab === 'schedule') this.openSiteScheduleLogs(site);
      if (tab === 'reverb') this.openSiteReverbLogs(site);
      if (tab.startsWith('worker:')) this.openSiteWorkerLogs(site, tab.slice(7));
      if (tab === 'app') this.loadAppLogFiles(site);
    },

    async loadServices() {
      const firstLoad = this.services.length === 0;
      if (firstLoad) this.servicesLoading = true;
      try {
        const res = await fetch('/api/services');
        const raw = await res.json();
        this.applyServices(raw);

        if (firstLoad) this.services = [];
      } finally {
        if (firstLoad) this.servicesLoading = false;
      }

    // applyServices: see applySites.
    applyServices(raw) {
      if (!Array.isArray(raw)) return;
      if (this.services.length === 0) {
        this.services = raw.map(s => ({ ...s, loading: false, error: '', flash: '', copied: false }));
        return;
      }
      raw.forEach(s => {
        const e = this.services.find(x => x.name === s.name);
        if (e) {
          e.status = s.status;
          e.pinned = s.pinned;
          e.site_count = s.site_count;
        } else {
          this.services.push({ ...s, loading: false, error: '', flash: '', copied: false });
        }
      });
      this.services = this.services.filter(e => raw.some(s => s.name === e.name));

    openDashboardIframe(svc) {
      if (this.dashboardSvc && this.dashboardSvc.name === svc.name) {
        this.dashboardSvc = null;
        location.hash = this.tab;
        return;
      }
      this.dashboardSvc = svc;
      location.hash = 'service/' + svc.name;
    },

    openDocsIframe() {
      if (this.dashboardSvc && this.dashboardSvc.name === 'docs') {
        this.dashboardSvc = null;
        location.hash = this.tab;
        return;
      }
      this.dashboardSvc = { name: 'docs', label: 'Documentation', dashboard: 'https://geodro.github.io/lerd/' };
      location.hash = 'docs';
    },

    // Dispatches a URL hash to the right view. Called on init and on
    // hashchange events so browser back/forward works. Hash formats:
    //   #sites / #services / #system         → main tabs (no selection)
    //   #sites/<domain>                      → sites tab with that site selected
    //   #services/<name>                     → services tab with that service selected
    //   #system/<section>                    → system tab with that section selected
    //   #docs                                 → docs iframe
    //   #service/<name>                       → service dashboard iframe
    applyHash() {
      const h = location.hash.slice(1);
      if (h === '' || h === 'sites' || h === 'services' || h === 'system') {
        this.tab = h || 'sites';
        this.dashboardSvc = null;
        return;
      }
      if (h === 'docs') {
        this.dashboardSvc = { name: 'docs', label: 'Documentation', dashboard: 'https://geodro.github.io/lerd/' };
        return;
      }
      if (h.startsWith('service/')) {
        const name = h.slice('service/'.length);
        const svc = this.services.find(s => s.name === name);
        if (svc) this.dashboardSvc = svc;
        return;
      }
      this.dashboardSvc = null;
      if (h.startsWith('sites/')) {
        this.tab = 'sites';
        const domain = h.slice('sites/'.length);
        const site = this.sites.find(s => s.domain === domain);
        if (site && this.selectedSiteDomain !== domain) this.selectSite(site);
        return;
      }
      if (h.startsWith('services/')) {
        this.tab = 'services';
        const name = h.slice('services/'.length);
        const svc = this.services.find(s => s.name === name);
        if (svc && this.selectedSvc !== name) this.selectService(svc);
        return;
      }
      if (h.startsWith('system/')) {
        this.tab = 'system';
        const key = h.slice('system/'.length);
        if (this.selectedSystem !== key) this.selectSystem(key);
        return;
      }
    },

    async loadPresets() {
      try {
        const res = await fetch('/api/services/presets');
        const data = await res.json();
        const next = (data || []).map(p => {
          const prev = this.presets.find(x => x.name === p.name) || {};
          const enriched = { ...p, installing: prev.installing || false, error: prev.error || '' };
          if ((enriched.versions || []).length > 0) {
            const installedSet = new Set(enriched.installed_tags || []);
            const available = enriched.versions.filter(v => !installedSet.has(v.tag));
            const stillValid = available.find(v => v.tag === prev.selected_version);
            const fallback = available.find(v => v.tag === enriched.default_version) || available[0];
            enriched.selected_version = (stillValid || fallback || {}).tag || '';
          }
          return enriched;
        });
        this.presets = next;
      } catch (_) {
        // transient errors leave existing list intact
      }
    },

    installablePresets() {
      return this.presets.filter(p => {
        // Hide presets whose dependencies are not installed yet (e.g.
        // mongo-express disappears until mongo is installed) so the list
        // only shows things the user can actually install right now.
        if ((p.missing_deps || []).length > 0) {
          return false;
        }
        if ((p.versions || []).length > 0) {
          return p.versions.length > (p.installed_tags || []).length;
        }
        return !p.installed;
      });
    },

    availableVersions(p) {
      const installed = new Set(p.installed_tags || []);
      return (p.versions || []).filter(v => !installed.has(v.tag));
    },

    async openPresetModal() {
      this.presetModal = { open: true, loading: this.presets.length === 0 };
      await this.loadPresets();

    closePresetModal() {
      this.presetModal.open = false;

    // detectServiceFamily returns "mysql" / "postgres" / "mongo" for any
    // service that looks like a member of that family — built-in name match,
    // connection URL scheme, or version-suffixed name prefix. Used so the
    // suggestion banner and Open admin button fire on alternates like
    // mysql-5-7, postgres-14-2, mongo-6 in addition to the canonical names.
    detectServiceFamily(svc) {
      if (!svc || !svc.name) return null;
      if (this.presetSuggestions[svc.name]) return svc.name;
      if (svc.connection_url) {
        const m = svc.connection_url.match(/^([a-z]+)(?:\+\w+)?:/);
        if (m) {
          const scheme = m[1];
          if (scheme === 'mysql' || scheme === 'mariadb') return 'mysql';
          if (scheme === 'postgresql' || scheme === 'postgres') return 'postgres';
          if (scheme === 'mongodb') return 'mongo';
        }
      }
      const prefix = svc.name.match(/^([a-z][a-z0-9]*?)-\d/);
      if (prefix && this.presetSuggestions[prefix[1]]) return prefix[1];
      return null;
    },

    serviceByName(name) {
      return this.services.find(s => s.name === name) || null;
    },

    jumpToService(name) {
      const svc = this.serviceByName(name);
      if (!svc) return;
      this.setTab('services');
      this.selectService(svc);
    },

    // adminServiceFor returns the installed admin-UI service that pairs with
    // a given database service (mysql -> phpmyadmin, postgres -> pgadmin), or
    // null when the admin UI is not installed yet.
    adminServiceFor(svc) {
      const family = this.detectServiceFamily(svc);
      if (!family) return null;
      const adminName = this.presetSuggestions[family];
      if (!adminName) return null;
      return this.services.find(s => s.name === adminName) || null;
    },

    async openAdminDashboard(adminSvc) {
      if (!adminSvc) return;
      if (adminSvc.status !== 'active') {
        await this.toggleService(adminSvc, 'start');

        this.dashboardSvc = fresh;

    suggestedPresetFor(svc) {
      if (!svc || !svc.name) return null;
      const presetName = this.presetSuggestions[svc.name];
      if (!presetName) return null;
      if (this.dismissedPresetSuggestions.includes(presetName)) return null;
      const p = this.presets.find(x => x.name === presetName);
      if (!p || p.installed) return null;
      return p;
    },

    dismissPresetSuggestion(presetName) {
      if (!presetName || this.dismissedPresetSuggestions.includes(presetName)) return;
      this.dismissedPresetSuggestions = [...this.dismissedPresetSuggestions, presetName];
      localStorage.setItem('lerd-dismissed-preset-suggestions', JSON.stringify(this.dismissedPresetSuggestions));

    async installPreset(p) {
      if (p.missing_deps && p.missing_deps.length > 0) {
        p.error = 'Install ' + p.missing_deps.join(', ') + ' first';
        return;
      }
      p.installing = true;
      p.error = '';
      let installedSvcName = p.name;
      try {
        let url = '/api/services/presets/' + encodeURIComponent(p.name);
        if ((p.versions || []).length > 0 && p.selected_version) {
          url += '?version=' + encodeURIComponent(p.selected_version);
        }
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) {
          p.error = data.error || 'install failed';
          return;
        }
        installedSvcName = data.name || p.name;
        await this.loadServices();
        const svc = this.services.find(s => s.name === installedSvcName);
        if (svc) {
          this.setTab('services');
          this.closePresetModal();
          this.selectService(svc);
          if (svc.status !== 'active') {
            this.toggleService(svc, 'start');
          }
        }
      } catch (e) {
        p.error = e.message;
      } finally {
        p.installing = false;
      }
      this.loadPresets();
    },

    async browseDir(dir) {

      m.loading = true;

    async linkSite() {
      const m = this.linkModal;
      m.linking = true;
      m.error = '';
      m.logs = [];
      try {
        const res = await fetch(`/api/sites/link?path=${encodeURIComponent(m.currentDir)}`, { method: 'POST' });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let result = null;
        let eventType = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              eventType = line.slice(7);
            } else if (line.startsWith('data: ')) {
              const payload = line.slice(6);
              if (eventType === 'done') {
                try { result = JSON.parse(payload); } catch (_) {}
              } else {
                m.logs.push(payload);
                this.$nextTick(() => {
                  const el = document.getElementById('link-log-area');
                  if (el) el.scrollTop = el.scrollHeight;
                });
              }
              eventType = '';
            } else if (line === '') {
              eventType = '';
            }
          }
        }
        if (!result || !result.ok) {
          m.error = (result && result.error) || 'Link failed';
          m.linking = false;
          return;
        }
        m.open = false;
        await this.loadSites();
        if (result.domain) {
          const site = this.sites.find(s => s.domain === result.domain);
          if (site) this.selectSite(site);
        }
      } catch (e) { m.error = e.message; }
      m.linking = false;
    },

    async domainModalSaveEdit(index) {
      const m = this.domainModal;
      const oldName = m.domains[index];
      const newName = m.editValue.trim().toLowerCase();
      if (!newName || newName === oldName) { this.domainModalCancelEdit(); return; }
      const siteName = m.site.name;
      m.loading = true;
      m.error = '';
      try {
        const res = await fetch(`/api/sites/${m.site.domain}/domain:edit?old=${encodeURIComponent(oldName)}&new=${encodeURIComponent(newName)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) { m.error = data.error; m.loading = false; return; }
        m.editIndex = -1;
        m.editValue = '';
        await this.loadSites();
        this._refreshDomainModal(siteName);
        m.dirty = true;
        m.flash = 'Domain updated';
        setTimeout(() => { m.flash = ''; }, 3000);
      } catch (e) { m.error = e.message; }
      m.loading = false;
    },

      m.error = '';
      try {
        const res = await fetch(`/api/sites/${m.site.domain}/domain:add?name=${encodeURIComponent(name)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) { m.error = data.error; m.loading = false; return; }

      if (m.domains.length <= 1) { m.error = 'Cannot remove the last domain'; return; }
      const name = m.domains[index];
      const siteName = m.site.name;
      m.loading = true;
      m.error = '';
      try {
        const res = await fetch(`/api/sites/${m.site.domain}/domain:remove?name=${encodeURIComponent(name)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) { m.error = data.error; m.loading = false; return; }
        if (m.editIndex === index) this.domainModalCancelEdit();
        await this.loadSites();
        this._refreshDomainModal(siteName);

    async domainModalRemoveConflict(c) {
      // Remove a conflict-filtered entry from .lerd.yaml only. The server's
      // domain:remove handler detects the entry isn't in the registered list
      // and routes it to a .lerd.yaml-only delete (no registry, vhost, or
      // cert work). Strip the TLD before passing the name through, since the
      // server re-appends it.
      const m = this.domainModal;
      const suffix = '.' + this.tld;
      const fullDomain = c.domain;
      const nameOnly = fullDomain.endsWith(suffix) ? fullDomain.slice(0, -suffix.length) : fullDomain;
      const siteName = m.site.name;
      m.loading = true;
      m.error = '';
      try {
        const res = await fetch(`/api/sites/${m.site.domain}/domain:remove?name=${encodeURIComponent(nameOnly)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) { m.error = data.error; m.loading = false; return; }
        await this.loadSites();
        this._refreshDomainModal(siteName);
        m.dirty = true;
        m.flash = 'Removed from .lerd.yaml';
        setTimeout(() => { m.flash = ''; }, 3000);
      } catch (e) { m.error = e.message; }
      m.loading = false;
    },

      }
    },

    async unlinkSite(site) {
      if (!confirm(`Unlink ${site.domain}? The site will stop being served by nginx.`)) return;
      site.unlinkLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/unlink`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          if (this.selectedSiteDomain === site.domain) {
            this.selectedSiteDomain = null;
            this.mobileShowDetail = false;
            if (this.siteLogs._source) { this.siteLogs._source.close(); this.siteLogs._source = null; }
            this.closeSiteQueueLogs();
            this.closeSiteHorizonLogs();
            this.closeSiteStripeLogs();
            this.closeSiteScheduleLogs();
            this.closeSiteReverbLogs();
            this.siteLogsTab = 'fpm';
          }
          this.sites = this.sites.filter(s => s.domain !== site.domain);
        } else {
          alert('Unlink failed: ' + (data.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Unlink failed: ' + (e.message || 'Request failed'));
      } finally {
        site.unlinkLoading = false;
      }
    },

    async pauseSite(site) {
      site.pauseLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/pause`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) { site.paused = true; }
        else { alert('Pause failed: ' + (data.error || 'Unknown error')); }
      } catch (e) {
        alert('Pause failed: ' + (e.message || 'Request failed'));
      } finally {
        site.pauseLoading = false;
      }
    },

    async resumeSite(site) {
      site.pauseLoading = true;
      try {
        const res = await fetch(`/api/sites/${site.domain}/unpause`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) { site.paused = false; }
        else { alert('Resume failed: ' + (data.error || 'Unknown error')); }
      } catch (e) {
        alert('Resume failed: ' + (e.message || 'Request failed'));
      } finally {
        site.pauseLoading = false;
      }
    },

    async openTerminal(site) {
      try {
        const res = await fetch(`/api/sites/${site.domain}/terminal`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) alert('Could not open terminal: ' + (data.error || 'Unknown error'));
      } catch (e) {
        alert('Could not open terminal: ' + (e.message || 'Request failed'));
      }
    },

    fpmContainer(site) {
      if (site.custom_container) return 'lerd-custom-' + site.name;
      if (site.runtime === 'frankenphp') return 'lerd-fp-' + site.name;
      if (!site.php_version) return '';
      return 'lerd-php' + site.php_version.replace('.', '') + '-fpm';
    },

    openLogs(site) {
      const container = this.fpmContainer(site);
      if (!container) return;
      if (this.logs.open && this.logs.container === container) { this.closeLogs(); return; }
      this.closeLogs();
      this.logs.container = container;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;
      const src = new EventSource(`/api/logs/${container}`);
      this.logs._source = src;
      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        if (this.logs.lines.length > 500) this.logs.lines.splice(0, this.logs.lines.length - 500);
        this.$nextTick(() => { const el = this.$refs.logScroll; if (el) el.scrollTop = el.scrollHeight; });
      };
    },

    openQueueLogs(site) {
      const label = `queue:${site.name}`;
      if (this.logs.open && this.logs.container === label) { this.closeLogs(); return; }
      this.closeLogs();
      this.logs.container = label;
      this.logs.lines = [];
      this.logs.open = true;
      this.logs.connected = false;
      const src = new EventSource(`/api/queue/${site.name}/logs`);
      this.logs._source = src;
      src.onopen = () => { this.logs.connected = true; };
      src.onerror = () => { this.logs.connected = false; };
      src.onmessage = (e) => {
        this.logs.lines.push(e.data);
        if (this.logs.lines.length > 500) this.logs.lines.splice(0, this.logs.lines.length - 500);
        this.$nextTick(() => { const el = this.$refs.logScroll; if (el) el.scrollTop = el.scrollHeight; });
      };
    },

    closeLogs() {
      if (this.logs._source) { this.logs._source.close(); this.logs._source = null; }
      this.logs.open = false;
      this.logs.connected = false;
    },

    clearLogs() { this.logs.lines = []; },

    async toggleService(svc, action) {
      svc.loading = true;
      svc.error = '';
      svc.flash = '';
      const ctrl = new AbortController();
      const timeoutId = setTimeout(() => ctrl.abort(), 8000);
      try {
        const res = await fetch(`/api/services/${svc.name}/${action}`, { method: 'POST', signal: ctrl.signal });
        const data = await res.json();
        if (data.ok) {
          svc.status = data.status || (action === 'stop' ? 'inactive' : 'active');
          svc.flash = action === 'start' ? 'Service started' : action === 'restart' ? 'Service restarted' : 'Service stopped';
          setTimeout(() => { svc.flash = ''; }, 3000);
          if (action === 'start' || action === 'restart') this.openServiceLogs(svc);
        } else {
          svc.error = data.error || 'Action failed';
        }
        await this.loadServices();
      } catch (e) {
        if (e.name === 'AbortError') {
          svc.flash = action === 'start' ? 'Starting in background…' : action === 'restart' ? 'Restarting in background…' : 'Stopping in background…';
          setTimeout(() => { svc.flash = ''; }, 4000);
        } else {
          svc.error = e.message || 'Request failed';
        }
      } finally {
        clearTimeout(timeoutId);
        svc.loading = false;
      }
    },

    async toggleServicePin(svc) {
      svc.loading = true;
      try {
        const action = svc.pinned ? 'unpin' : 'pin';
        const res = await fetch(`/api/services/${svc.name}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) svc.pinned = !svc.pinned;
      } catch (_) {}
      finally { svc.loading = false; }
    },

    async removeService(svc) {
      if (!confirm(`Remove service ${svc.name}?`)) return;
      svc.loading = true;
      try {
        const res = await fetch(`/api/services/${svc.name}/remove`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.services = this.services.filter(s => s.name !== svc.name);
          if (this.selectedSvc === svc.name) {
            this.selectedSvc = null;
            this.mobileShowDetail = false;
          }
          // If a preset-backed service was removed, refresh the preset list
          // so it shows up as available again in the suggestion banner.
          await this.loadPresets();
        } else {
          svc.error = data.error || 'Remove failed';
        }
      } catch (e) {
        svc.error = e.message || 'Request failed';
      } finally {
        svc.loading = false;
      }
    },

    async setPHPDefault(version) {
      this.phpDefaultLoading = true;
      try {
        const res = await fetch(`/api/php-versions/${version}/set-default`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) this.systemStatus = { ...this.systemStatus, php_default: data.php_default };
      } catch (_) {}
      finally { this.phpDefaultLoading = false; }
    },

    async setNodeDefault(version) {
      this.nodeDefaultLoading = true;
      try {
        const res = await fetch(`/api/node-versions/${version}/set-default`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) this.systemStatus = { ...this.systemStatus, node_default: data.node_default };
      } catch (_) {}
      finally { this.nodeDefaultLoading = false; }
    },

    phpSiteCount(v) {
      return this.sites.filter(s => s.php_version === v).length;
    },

    nodeSiteCount(v) {
      const nodeDefault = this.systemStatus && this.systemStatus.node_default;
      return this.sites.filter(s => {
        if (s.node_version === v) return true;
        if (!s.node_version && v === nodeDefault) return true;
        return false;
      }).length;
    },

    async toggleFPM(version) {
      this.phpFPMLoading = { ...this.phpFPMLoading, [version]: true };
      const action = this.fpmRunning(version) ? 'stop' : 'start';
      try {
        const res = await fetch(`/api/php-versions/${version}/${action}`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) await this.loadStatus();
      } finally {
        this.phpFPMLoading = { ...this.phpFPMLoading, [version]: false };
      }
    },

    async removePHPVersion(version) {
      this.phpRemoveLoading = { ...this.phpRemoveLoading, [version]: true };
      this.phpRemoveError = { ...this.phpRemoveError, [version]: '' };
      try {
        const res = await fetch(`/api/php-versions/${version}/remove`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.phpVersions = this.phpVersions.filter(v => v !== version);
          this.selectedSystem = null;
          this.mobileShowDetail = false;
          await this.loadStatus();
        } else {
          this.phpRemoveError = { ...this.phpRemoveError, [version]: data.error || 'Remove failed' };
        }
      } catch (e) {
        this.phpRemoveError = { ...this.phpRemoveError, [version]: e.message || 'Request failed' };
      } finally {
        this.phpRemoveLoading = { ...this.phpRemoveLoading, [version]: false };
      }
    },

    async removeNodeVersion(version) {
      this.nodeRemoveLoading = { ...this.nodeRemoveLoading, [version]: true };
      this.nodeRemoveError = { ...this.nodeRemoveError, [version]: '' };
      try {
        const res = await fetch(`/api/node-versions/${version}/remove`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          this.nodeVersions = this.nodeVersions.filter(v => v !== version);
          this.selectedSystem = null;
          this.mobileShowDetail = false;
        } else {
          this.nodeRemoveError = { ...this.nodeRemoveError, [version]: data.error || 'Remove failed' };
        }
      } catch (e) {
        this.nodeRemoveError = { ...this.nodeRemoveError, [version]: e.message || 'Request failed' };
      } finally {
        this.nodeRemoveLoading = { ...this.nodeRemoveLoading, [version]: false };
      }
    },

    fpmRunning(v) {
      const fpms = (this.systemStatus && this.systemStatus.php_fpms) || [];
      const fpm = fpms.find(f => f.version === v);
      return fpm ? fpm.running : false;
    },

    get allCoreRunning() {
      return !!(this.systemStatus.dns?.ok &&
        this.systemStatus.nginx?.running &&
        (this.systemStatus.php_fpms || []).every(f => f.running || this.phpSiteCount(f.version) === 0));
    },

    // Overall lerd health for the "Lerd" entry dot in the System list.
    // red wins over yellow because a broken core is more urgent than an update.
    get lerdStatusColor() {
      if (this.statusLoading || !this.systemStatus || Object.keys(this.systemStatus).length === 0) return 'gray';
      const dnsOk = !!(this.systemStatus.dns && this.systemStatus.dns.ok);
      const nginxOk = !!(this.systemStatus.nginx && this.systemStatus.nginx.running);
      const watcherOk = !!this.systemStatus.watcher_running;
      if (!dnsOk || !nginxOk || !watcherOk) return 'red';
      if (this.version.hasUpdate) return 'yellow';
      return 'green';
    },

    async lerdStart() {
      this.lerdStarting = true;
      try {
        await fetch('/api/lerd/start', { method: 'POST' });
        await Promise.all([this.loadStatus(), this.loadServices(), this.loadSites()]);
      } catch (_) {} finally { this.lerdStarting = false; }
    },

    async lerdStop() {
      this.lerdStopping = true;
      try {
        await fetch('/api/lerd/stop', { method: 'POST' });
        await Promise.all([this.loadStatus(), this.loadServices(), this.loadSites()]);
      } catch (_) {} finally { this.lerdStopping = false; }
    },

    async startWatcher() {
      this.watcherStarting = true;
      try {
        await fetch('/api/watcher/start', { method: 'POST' });
        await this.loadStatus();
        if (this.systemStatus.watcher_running) this.openWatcherLogs();
      } catch (_) {} finally { this.watcherStarting = false; }
    },

    async loadStatus() {
      this.statusLoading = (Object.keys(this.systemStatus).length === 0);
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        this.applyStatus(data);
      } catch (_) {} finally {
        this.statusLoading = false;
      }
    },

    // applyStatus: see applySites.
    applyStatus(data) {
      if (!data || typeof data !== 'object') return;
      this.systemStatus = data;
      const next = { ...this.xdebugEnabled };
      const nextMode = { ...this.xdebugMode };
      (data.php_fpms || []).forEach(fpm => {
        if (!this.xdebugLoading[fpm.version]) {
          next[fpm.version] = fpm.xdebug_enabled;
          nextMode[fpm.version] = fpm.xdebug_mode || '';
        }
      });
      this.xdebugEnabled = next;
      this.xdebugMode = nextMode;
    },

    async loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        this.autostartEnabled = data.autostart_on_login || false;
      } catch (_) {}
    },

    async toggleXdebug(version) {
      const current = !!this.xdebugEnabled[version];
      const action = current ? 'off' : 'on';
      const nextMode = current ? '' : (this.xdebugMode[version] || 'debug');
      this.xdebugEnabled = { ...this.xdebugEnabled, [version]: !current };
      this.xdebugMode = { ...this.xdebugMode, [version]: nextMode };
      this.xdebugLoading = { ...this.xdebugLoading, [version]: true };
      try {
        const url = action === 'on'
          ? `/api/xdebug/${version}/on?mode=${encodeURIComponent(nextMode)}`
          : `/api/xdebug/${version}/off`;
        const res = await fetch(url, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) {
          this.xdebugEnabled = { ...this.xdebugEnabled, [version]: current };
          this.xdebugMode = { ...this.xdebugMode, [version]: current ? (this.xdebugMode[version] || '') : '' };
        }
      } catch (_) {
        this.xdebugEnabled = { ...this.xdebugEnabled, [version]: current };
      } finally {
        this.xdebugLoading = { ...this.xdebugLoading, [version]: false };
      }
    },

    async setXdebugMode(version, mode) {
      const previous = this.xdebugMode[version] || 'debug';
      if (mode === previous) return;
      this.xdebugMode = { ...this.xdebugMode, [version]: mode };
      this.xdebugLoading = { ...this.xdebugLoading, [version]: true };
      try {
        const res = await fetch(`/api/xdebug/${version}/on?mode=${encodeURIComponent(mode)}`, { method: 'POST' });
        const data = await res.json();
        if (!data.ok) this.xdebugMode = { ...this.xdebugMode, [version]: previous };
      } catch (_) {
        this.xdebugMode = { ...this.xdebugMode, [version]: previous };
      } finally {
        this.xdebugLoading = { ...this.xdebugLoading, [version]: false };
      }
    },

    async toggleAutostart() {
      this.autostartLoading = true;
      try {
        const res = await fetch('/api/settings/autostart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled: !this.autostartEnabled }),
        });
        const data = await res.json();
        if (data.ok) this.autostartEnabled = !this.autostartEnabled;
      } catch (_) {} finally {
        this.autostartLoading = false;
      }
    },

    async installNodeVersion() {
      if (!this.nodeInstall.version.trim()) return;
      this.nodeInstall.installing = true;
      this.nodeInstall.error = '';
      this.nodeInstall.done = false;
      try {
        const res = await fetch('/api/node-versions/install', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ version: this.nodeInstall.version.trim() }),
        });
        const data = await res.json();
        if (data.ok) {
          this.nodeInstall.done = true;
          this.nodeInstall.version = '';
          await this.loadNodeVersions();
        } else {
          this.nodeInstall.error = data.error || 'Install failed';
        }
      } catch (e) {
        this.nodeInstall.error = e.message || 'Request failed';
      } finally {
        this.nodeInstall.installing = false;
      }
    },
  };
}
</script>

<!-- Service Preset Modal -->
<template x-if="presetModal.open">
  <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closePresetModal()">
    <div class="absolute inset-0 bg-black/50" @click="closePresetModal()"></div>
    <div class="relative bg-white dark:bg-lerd-card border border-gray-200 dark:border-lerd-border rounded-xl shadow-2xl w-full max-w-lg mx-4" @click.stop>
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 dark:border-lerd-border">
        <h3 class="font-semibold text-gray-900 dark:text-white">Add a service preset</h3>
        <button @click="closePresetModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="px-5 py-3 border-b border-gray-100 dark:border-lerd-border">
        <p class="text-xs text-gray-500 dark:text-gray-400">Bundled, opt-in services. Installing one adds it as a custom service so you can start, stop, or remove it from the Services tab.</p>
      </div>
      <div class="px-5 py-3 max-h-80 overflow-y-auto">
        <div x-show="presetModal.loading" class="py-4 text-center text-xs text-gray-400">Loading...</div>
        <div x-show="!presetModal.loading && installablePresets().length === 0" class="py-4 text-center text-xs text-gray-400">All bundled presets are installed.</div>
        <template x-for="p in installablePresets()" :key="'preset-'+p.name">
          <div class="border border-gray-100 dark:border-lerd-border rounded-lg p-3 mb-2 last:mb-0">
            <div class="flex items-center gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="text-sm font-semibold text-gray-900 dark:text-white" x-text="p.name"></span>
                  <span x-show="(p.installed_tags || []).length > 0" class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400" x-text="(p.installed_tags || []).join(', ') + ' installed'"></span>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5" x-text="p.description"></p>
                <div x-show="p.image" class="text-[11px] text-gray-400 dark:text-gray-500 mt-1 font-mono truncate" x-text="p.image"></div>
                <div x-show="p.depends_on && p.depends_on.length > 0" class="text-[11px] text-gray-400 dark:text-gray-500 mt-1">
                  depends on: <span x-text="(p.depends_on || []).join(', ')"></span>
                </div>
                <div x-show="p.dashboard" class="text-[11px] text-gray-400 dark:text-gray-500 mt-0.5">
                  dashboard: <span x-text="p.dashboard"></span>
                </div>
                <div x-show="(p.missing_deps || []).length > 0" class="text-[11px] text-amber-600 dark:text-amber-400 mt-1">
                  install <span x-text="(p.missing_deps || []).join(', ')"></span> first
                </div>
              </div>
              <template x-if="(p.versions || []).length > 0">
                <select x-model="p.selected_version"
                  class="shrink-0 text-xs bg-gray-50 dark:bg-lerd-bg border border-gray-200 dark:border-lerd-border rounded px-2 py-1.5 text-gray-700 dark:text-gray-300 focus:outline-none focus:border-lerd-red/50">
                  <template x-for="v in availableVersions(p)" :key="'v-'+p.name+'-'+v.tag">
                    <option :value="v.tag" x-text="v.label || v.tag"></option>
                  </template>
                </select>
              </template>
              <button @click="installPreset(p)"
                :disabled="!!(p.installing || (p.missing_deps || []).length > 0)"
                :title="(p.missing_deps || []).length > 0 ? 'Install ' + p.missing_deps.join(', ') + ' first' : ''"
                class="text-xs font-medium bg-lerd-red text-white rounded px-3 py-1.5 hover:bg-lerd-redhov transition-colors disabled:opacity-40 disabled:cursor-not-allowed shrink-0 flex items-center gap-1.5">
                <svg x-show="p.installing" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
                <span x-text="p.installing ? 'Adding…' : 'Add'"></span>
              </button>
            </div>
            <p x-show="p.error" class="text-[11px] text-red-500 mt-2" x-text="p.error"></p>
          </div>
        </template>
      </div>
      <div class="px-5 py-3 border-t border-gray-100 dark:border-lerd-border flex items-center justify-end">
        <button @click="closePresetModal()" class="text-xs border border-gray-200 dark:border-lerd-border text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 rounded px-3 py-1.5 transition-colors">Close</button>
      </div>
    </div>
  </div>
</template>

<!-- Link Site Modal -->
<template x-if="linkModal.open">
  <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeLinkModal()">
    <div class="absolute inset-0 bg-black/50" @click="closeLinkModal()"></div>
    <div class="relative bg-white dark:bg-lerd-card border border-gray-200 dark:border-lerd-border rounded-xl shadow-2xl w-full max-w-lg mx-4" @click.stop>
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 dark:border-lerd-border">
        <h3 class="font-semibold text-gray-900 dark:text-white">Link Site</h3>
        <button @click="closeLinkModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Current path -->
      <div class="px-5 py-3 border-b border-gray-100 dark:border-lerd-border">
        <div class="text-xs text-gray-400 mb-1">Directory</div>
        <div class="text-sm font-mono text-gray-700 dark:text-gray-300 truncate" x-text="linkModal.currentDir"></div>
      </div>

      <!-- Directory browser -->
      <div x-show="!linkModal.linking" class="px-5 py-2 max-h-72 overflow-y-auto">
        <div x-show="linkModal.loading" class="py-4 text-center text-xs text-gray-400">Loading...</div>
        <div x-show="!linkModal.loading">
          <template x-for="d in linkModal.dirs" :key="d.path">
            <button @click="browseDir(d.path)"
              class="w-full flex items-center gap-2 px-2 py-1.5 text-left text-sm rounded hover:bg-gray-50 dark:hover:bg-white/5 transition-colors"
              :class="d.name === '..' ? 'text-gray-400' : 'text-gray-700 dark:text-gray-300'">
              <svg class="w-4 h-4 shrink-0 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
              <span class="truncate" x-text="d.name"></span>
            </button>
          </template>
          <div x-show="linkModal.dirs.length === 0" class="py-4 text-center text-xs text-gray-400">No subdirectories</div>
        </div>
      </div>

      <!-- Linking logs -->
      <div x-show="linkModal.linking" class="px-5 py-3">
        <div id="link-log-area" class="bg-gray-50 dark:bg-black/30 rounded-lg p-3 max-h-56 overflow-y-auto font-mono text-xs text-gray-600 dark:text-gray-400 space-y-0.5">
          <template x-for="(line, i) in linkModal.logs" :key="i">
            <div x-text="line"></div>
          </template>
          <div x-show="linkModal.logs.length === 0" class="text-gray-400 dark:text-gray-500">Waiting for output...</div>
        </div>
      </div>

      <!-- Error -->
      <template x-if="linkModal.error">
        <div class="px-5 py-2">
          <p class="text-xs text-red-500" x-text="linkModal.error"></p>
        </div>
      </template>

      <!-- Footer -->
      <div class="px-5 py-4 border-t border-gray-100 dark:border-lerd-border flex items-center justify-end gap-2">
        <button x-show="!linkModal.linking" @click="closeLinkModal()"
          class="text-xs border border-gray-200 dark:border-lerd-border text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-white/5 rounded px-3 py-1.5 transition-colors">
          Cancel
        </button>
        <button @click="linkSite()" :disabled="linkModal.linking || linkModal.loading"
          class="text-xs font-medium bg-lerd-red text-white rounded px-4 py-1.5 hover:bg-lerd-redhov transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1.5">
          <svg x-show="linkModal.linking" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
          <span x-text="linkModal.linking ? 'Linking...' : 'Link This Directory'"></span>
        </button>
      </div>
    </div>
  </div>
</template>

<!-- Domain Management Modal -->
<template x-if="domainModal.open">
  <div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="closeDomainModal()">
    <div class="absolute inset-0 bg-black/50" @click="closeDomainModal()"></div>
    <div class="relative bg-white dark:bg-lerd-card border border-gray-200 dark:border-lerd-border rounded-xl shadow-2xl w-full max-w-md mx-4" @click.stop>
      <!-- Header -->
      <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 dark:border-lerd-border">
        <h3 class="font-semibold text-gray-900 dark:text-white">Manage Domains</h3>
        <button @click="closeDomainModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Domain List -->
      <div class="px-5 py-4 space-y-2 max-h-64 overflow-y-auto">
        <!-- Conflicting domains: declared in .lerd.yaml but already used by another site on this machine. The trash button removes the entry from .lerd.yaml only — no registry change. -->
        <template x-for="c in (domainModal.conflicting || [])" :key="c.domain">
          <div class="flex items-center gap-2 group opacity-70">
            <div class="flex items-center gap-2 flex-1 min-w-0">
              <svg class="w-4 h-4 text-amber-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                :title="c.owned_by ? ('In .lerd.yaml but already used by site \u201c' + c.owned_by + '\u201d on this machine. Not registered.') : ('In .lerd.yaml but already used by another site on this machine. Not registered.')">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M4.93 19h14.14a2 2 0 001.74-3l-7.07-12a2 2 0 00-3.48 0L3.19 16a2 2 0 001.74 3z"/>
              </svg>
              <div class="flex-1 min-w-0 flex items-center gap-1.5">
                <span class="text-sm font-mono text-gray-500 dark:text-gray-400 truncate line-through" x-text="c.domain"></span>
                <span x-show="c.owned_by" class="text-[10px] font-medium text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 px-1.5 py-0.5 rounded shrink-0" x-text="'used by ' + c.owned_by"></span>
              </div>
              <button @click="domainModalRemoveConflict(c)" :disabled="domainModal.loading"
                class="text-gray-400 hover:text-red-500 transition-colors shrink-0 disabled:opacity-50" title="Remove from .lerd.yaml">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        </template>
        <template x-for="(dom, i) in domainModal.domains" :key="i">
          <div class="flex items-center gap-2 group">
            <!-- View mode -->
            <div x-show="domainModal.editIndex !== i" class="flex items-center gap-2 flex-1 min-w-0">
                <div class="flex-1 min-w-0 flex items-center gap-1.5">
                  <span class="text-sm font-mono text-gray-700 dark:text-gray-300 truncate" x-text="dom"></span>
                  <span class="text-sm text-gray-400 dark:text-gray-500 shrink-0" x-text="'.' + tld"></span>
                  <span x-show="i === 0" class="text-[10px] font-medium text-lerd-red bg-red-50 dark:bg-red-900/20 px-1.5 py-0.5 rounded shrink-0">primary</span>
                </div>
                <button @click="domainModalStartEdit(i)" class="text-gray-400 hover:text-lerd-red transition-colors shrink-0" title="Edit">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                </button>
                <button x-show="domainModal.domains.length > 1" @click="domainModalRemove(i)" :disabled="domainModal.loading"
                  class="text-gray-400 hover:text-red-500 transition-colors shrink-0 disabled:opacity-50" title="Remove">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            </div>
            <!-- Edit mode -->
            <div x-show="domainModal.editIndex === i" class="flex items-center gap-2 flex-1">
                <input type="text" x-model="domainModal.editValue"
                  @keydown.enter="domainModalSaveEdit(i)"
                  @keydown.escape="domainModalCancelEdit()"
                  x-effect="if (domainModal.editIndex === i) $nextTick(() => $el.focus())"
                  class="flex-1 text-sm font-mono bg-transparent border border-lerd-red/50 rounded px-2 py-1 text-gray-700 dark:text-gray-300 focus:outline-none focus:border-lerd-red"
                  :disabled="domainModal.loading">
                <span class="text-sm text-gray-400 shrink-0" x-text="'.' + tld"></span>
                <button @click="domainModalSaveEdit(i)" :disabled="domainModal.loading"
                  class="text-emerald-500 hover:text-emerald-600 transition-colors shrink-0 disabled:opacity-50" title="Save">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </button>
                <button @click="domainModalCancelEdit()" class="text-gray-400 hover:text-gray-600 transition-colors shrink-0" title="Cancel">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
          </div>
        </template>
      </div>

      <!-- Add Domain -->
      <div class="px-5 py-3 border-t border-gray-100 dark:border-lerd-border">
        <div class="flex items-center gap-2">
          <input type="text" x-model="domainModal.newDomain" placeholder="Add domain"
            @keydown.enter="domainModalAdd()"
            class="flex-1 text-sm font-mono bg-transparent border border-gray-200 dark:border-lerd-border rounded px-2 py-1.5 text-gray-700 dark:text-gray-300 placeholder-gray-400 dark:placeholder-gray-600 focus:outline-none focus:border-lerd-red/50"
            :disabled="domainModal.loading">
          <span class="text-sm text-gray-400 shrink-0" x-text="'.' + tld"></span>
          <button @click="domainModalAdd()" :disabled="domainModal.loading || !domainModal.newDomain.trim()"
            class="text-xs font-medium bg-lerd-red text-white rounded px-3 py-1.5 hover:bg-lerd-redhov transition-colors disabled:opacity-50 disabled:cursor-not-allowed shrink-0">
            Add
          </button>
        </div>
      </div>

      <!-- Flash / Error -->
      <div x-show="domainModal.flash" class="px-5 py-2 border-t border-gray-100 dark:border-lerd-border">
        <p class="text-xs text-emerald-700 dark:text-emerald-500 bg-emerald-50 dark:bg-emerald-500/10 rounded-lg px-2 py-1.5 text-center" x-text="domainModal.flash"></p>
      </div>
      <template x-if="domainModal.error">
        <div class="px-5 py-2 border-t border-gray-100 dark:border-lerd-border">
          <p class="text-xs text-red-500" x-text="domainModal.error"></p>
        </div>
      </template>
    </div>
  </div>
</template>

</body>
</html>
