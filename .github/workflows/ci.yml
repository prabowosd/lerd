name: CI

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main", "release/**"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal/ui/web/package-lock.json

      - name: Build UI
        run: make build-ui

      - name: Install tray build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libayatana-appindicator3-dev

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=1 go build -o /dev/null ./cmd/lerd

      - name: Test
        run: CGO_ENABLED=1 go test ./...

      - name: Vet
        run: CGO_ENABLED=1 go vet ./...

      - name: Format
        run: test -z "$(gofmt -l .)"

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: internal/ui/web/package-lock.json

      - name: Build UI
        run: make build-ui

      - name: Download dependencies
        run: go mod download

      - name: Build (nogui)
        run: CGO_ENABLED=0 go build -tags nogui -o /dev/null ./cmd/lerd

      - name: Test
        run: CGO_ENABLED=0 go test -tags nogui ./...

      - name: Vet
        run: CGO_ENABLED=0 go vet -tags nogui ./...

      - name: Format
        run: test -z "$(gofmt -l .)"

  installer:
    name: Installer Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Run installer tests
        run: bats tests/installer/installer.bats
