name: Docs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Copy static assets into public
        run: |
          mkdir -p docs/public/assets/screenshots
          cp screenshots/app-*.png docs/public/assets/screenshots/
          cp install.sh docs/public/install.sh
          mkdir -p docs/public/icons
          cp docs/public/assets/logo.svg docs/public/icons/icon.svg

      - name: Build the embedded UI demo
        working-directory: internal/ui/web
        run: |
          npm ci
          npm run build:demo

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build
        working-directory: docs
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
